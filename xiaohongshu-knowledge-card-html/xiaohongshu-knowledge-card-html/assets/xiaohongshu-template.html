<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaohongshu Knowledge Card</title>
  <style>
    :root {
      --ink: #1a1a2e;
      --paper: #faf8f3;
      --accent: #e85d26;
      --accent2: #2d6a8f;
      --accent3: #f2c94c;
      --border: #e0dbd0;
      --muted: #6f6a63;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(232, 93, 38, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(45, 106, 143, 0.12), transparent 30%),
        var(--paper);
      color: var(--ink);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .pages {
      display: grid;
      gap: 20px;
      justify-content: center;
    }

    .page {
      width: 540px;
      height: 720px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(250,248,243,0.98) 100%);
      border: 1px solid rgba(224, 219, 208, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 50px 40px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(232, 93, 38, 0.06), transparent 25%),
        linear-gradient(315deg, rgba(45, 106, 143, 0.06), transparent 22%);
      pointer-events: none;
    }

    .part-tag {
      position: relative;
      align-self: flex-start;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      margin: 8px 0 4px;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 2.15rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    .lead {
      position: relative;
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.65;
    }

    .content-card {
      position: relative;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent2);
      border-radius: 16px;
      padding: 1rem 1rem 0.95rem;
    }

    .content-card h2,
    .content-card h3 {
      margin: 0 0 0.55rem;
      font-size: 1rem;
      color: var(--ink);
    }

    .content-card p,
    .content-card li {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .content-card ul,
    .content-card ol {
      margin: 0;
      padding-left: 1.2rem;
      display: grid;
      gap: 0.35rem;
    }

    .highlight-box {
      position: relative;
      border-radius: 16px;
      padding: 0.95rem 1rem;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      line-height: 1.6;
    }

    .warning-box {
      position: relative;
      border-radius: 16px;
      padding: 0.95rem 1rem;
      background: rgba(242, 201, 76, 0.24);
      border: 1px solid rgba(242, 201, 76, 0.55);
      color: var(--ink);
      line-height: 1.6;
    }

    code {
      background: #f0ede6;
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 6px;
      font-family: "JetBrains Mono", "Cascadia Code", monospace;
      font-size: 0.82rem;
    }

    .visual-placeholder {
      position: relative;
      flex: 1;
      min-height: 200px;
      border-radius: 18px;
      border: 1px dashed rgba(45, 106, 143, 0.35);
      background:
        linear-gradient(135deg, rgba(45, 106, 143, 0.06), rgba(232, 93, 38, 0.04)),
        rgba(255, 255, 255, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #a8a39c;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .page-footer {
      position: absolute;
      right: 40px;
      bottom: 28px;
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <main class="pages">
    <section class="page">
      <div class="part-tag">Part 01</div>
      <h1>把 <span>Markdown</span> 变成干货卡片</h1>
      <p class="lead">将这里替换为从 Markdown 提炼出的导语、目标或核心判断，保持语言紧凑、可截图、可传播。</p>

      <article class="content-card">
        <h2>核心信息</h2>
        <ul>
          <li>将要点拆成短句，避免大段原文照搬。</li>
          <li>将路径、命令、按钮名包进 <code>&lt;code&gt;</code>。</li>
          <li>每页保留可替换截图区，方便后续插入实机演示。</li>
        </ul>
      </article>

      <div class="highlight-box">把最重要的结论、收益或行动建议放进高亮区。</div>
      <div class="visual-placeholder">SCREENSHOT / DEMO / WORKFLOW</div>
      <div class="page-footer">01 / 01</div>
    </section>
  </main>
</body>
</html>
